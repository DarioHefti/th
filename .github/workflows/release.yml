name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get tag
        id: get_tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.get_tag.outputs.TAG }}
        run: |
          EXTENSION=""
          if [ "$GOOS" = "windows" ]; then
            EXTENSION=".exe"
          fi
          OUTPUT_NAME="th-${GOOS}-${GOARCH}${EXTENSION}"
          go build -ldflags "-X github.com/terminal-help/th/cmd.Version=${VERSION}" -o "${OUTPUT_NAME}" .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_tag.outputs.TAG }}
          files: th-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Create Pull Request
        run: |
          cd /tmp
          git clone https://github.com/terminal-help/homebrew-th.git
          cd homebrew-th
          rm -rf Formula/*
          
          # Create formula for each platform
          cat > Formula/th.rb << 'EOF'
          class Th < Formula
            desc "Get shell commands from an LLM"
            homepage "https://github.com/terminal-help/th"
            version "{{VERSION}}"
            license "MIT"
            
            if OS.mac?
              if Hardware::CPU.arm?
                url "https://github.com/terminal-help/th/releases/download/v{{VERSION}}/th-darwin-arm64"
                sha256 "{{DARWIN_ARM64_SHA}}"
              else
                url "https://github.com/terminal-help/th/releases/download/v{{VERSION}}/th-darwin-amd64"
                sha256 "{{DARWIN_AMD64_SHA}}"
              end
            elsif OS.linux?
              if Hardware::CPU.arm64?
                url "https://github.com/terminal-help/th/releases/download/v{{VERSION}}/th-linux-arm64"
                sha256 "{{LINUX_ARM64_SHA}}"
              else
                url "https://github.com/terminal-help/th/releases/download/v{{VERSION}}/th-linux-amd64"
                sha256 "{{LINUX_AMD64_SHA}}"
              end
            end
            
            def install
              bin.install "th"
            end
          end
          EOF
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update th to ${{ steps.get_tag.outputs.TAG }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
